name: Deploy Edge Functions

# Faz o deploy da Edge Function generate-diet quando algo em supabase/functions
# (ou config.toml) muda. O runner do GitHub já tem Docker, então não precisa
# de Docker local. Configure os secrets do repositório:
#   SUPABASE_ACCESS_TOKEN  -> Account > Access Tokens (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF   -> ref do projeto (ex.: kdweoikrtnvhoifcxadi)
on:
  push:
    branches: [main, security/api-routes-auth]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy generate-diet
        run: supabase functions deploy generate-diet --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
